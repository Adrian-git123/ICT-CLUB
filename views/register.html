<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Club Membership | Register</title>
    <style>
        body { background: #0f0f1a; color: white; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); padding: 40px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1); width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h2 { text-align: center; margin-bottom: 24px; color: #fff; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; margin-bottom: 18px; background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: white; box-sizing: border-box; }
        input:focus { outline: none; border-color: #800020; }
        button { width: 100%; padding: 12px; background: #800020; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #a00028; }
        p { text-align: center; font-size: 14px; margin-top: 15px; color: #b3b3b3; }
        a { color: white; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Join Club</h2>
        <form action="/register" method="POST">
            <input type="text" name="username" placeholder="Choose Username" required autocomplete="off">
            <input type="password" name="password" placeholder="Create Password" required>
            <button type="submit">Sign Up</button>
        </form>
        <p>Already a member? <a href="/login">Log In</a></p>
    </div>
</body>
</html>
